<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微信朋友圈分析工具</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="home-page">
    <main class="container">
      <section class="landing hero">
        <p class="hero-kicker">决策辅助工具</p>
        <h1>发朋友圈前，先看一眼风险和收益</h1>
        <p class="hero-subtitle">把主观“要不要发”变成可计算模型，给出综合百分制评分、风险人群拆分和可见分组建议。</p>
        <div class="landing-actions dual">
          <a class="button-link primary-link" href="/start-analysis">立即开始分析</a>
          <a class="button-link" href="/analysis-result">查看结果页示例</a>
        </div>
      </section>

      <section class="landing-grid">
        <article class="card landing-feature">
          <h2>综合评分</h2>
          <p>输出 0-100 分结果，并结合建议标签，让你快速判断“发 / 慎发 / 不发”。</p>
        </article>
        <article class="card landing-feature">
          <h2>风险拆分</h2>
          <p>定位风险贡献最高的人群，知道问题可能来自哪里，而不是只看一个总分。</p>
        </article>
        <article class="card landing-feature">
          <h2>分组模拟</h2>
          <p>自动比较“全部可见 / 仅分组可见 / 屏蔽指定人群”，给出更稳妥的可见方案。</p>
        </article>
      </section>

      <section class="card landing-flow">
        <h2>使用流程</h2>
        <div class="flow-steps">
          <div class="flow-step">
            <span>1</span>
            <p>填写内容类型、发布时间、敏感信息</p>
          </div>
          <div class="flow-step">
            <span>2</span>
            <p>设置受众结构和可见分组</p>
          </div>
          <div class="flow-step">
            <span>3</span>
            <p>查看综合得分与最优可见建议</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
